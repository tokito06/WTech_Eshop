<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anaheim:wght@400..800&display=swap">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39+Text&display=swap" rel="stylesheet">
  <title>Registration</title>
</head>
<body>


<div class="register">


  <div class="register__container">
    <div class="auth__form">
      <h2 class="libre-barcode-39-text-regular">Registration</h2>

      <input type="text" placeholder="Name" >
      <input type="text" placeholder="Surname" >
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">

      <select class="register__size">

        <option>Type of user</option>
        <option>Seller</option>
        <option>Buyer</option>
      </select>
      <button>Register</button>

    </div>
  </div>
</div>


</body>
</html>
