<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="product.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anaheim:wght@400..800&display=swap" rel="stylesheet">
    <title>Product</title>
</head>
<body>

<header>
    <h1>Logo</h1>
    <div class="header__icons">
        <a class="header__icon" href="./favourites.html">
            <span class="material-symbols-outlined md-36">favorite</span>
        </a>
        <a class="header__icon" href="./cart.html">
            <span class="material-symbols-outlined">shopping_cart</span>
        </a>
        <a class="header__icon" href="./profile.html">
            <span class="material-symbols-outlined">account_circle</span>
        </a>
    </div>
</header>

<main class="product">
    <div class="product__gallery">
        <div class="product__main-photo">Photo</div>

        <div class="product__thumbnails">
            <div class="product__thumb"></div>
            <div class="product__thumb"></div>
            <div class="product__thumb"></div>
            <div class="product__thumb"></div>
            <div class="product__thumb"></div>
        </div>

        <div class="product__rating">
            ☆ ☆ ☆ ☆ ☆
        </div>
    </div>

    <div class="product__info">
        <h1>Name : for example jordans</h1>

        <p class="product__description">
            Describing: material , colour , etc.
        </p>

        <select class="product__size">
            <option>Size</option>
            <option>38</option>
            <option>39</option>
            <option>40</option>
            <option>41</option>
        </select>

        <div class="product__actions">
            <button class="product__fav">♡</button>
            <button class="product__add">Add to bag</button>
        </div>
    </div>

</main>

<footer>
    <small>© 2026 Rusaniuk&Popovych, Inc. All rights reserved</small>
    <div class="footer__links">
        <a href="#">Get Help</a>
        <a href="#">About Us</a>
        <a href="#">Contacts</a>
    </div>
</footer>

</body>
</html>
