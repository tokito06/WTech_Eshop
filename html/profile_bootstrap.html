<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts & Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anaheim:wght@400..800&display=swap" rel="stylesheet">

    <title>Profile</title>

    <!-- Custom stylesheets -->
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/profile.css">
</head>
<body>

<!-- Header -->
<nav class="navbar">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="#">Logo</a>
        <div class="d-flex align-items-center gap-1">
            <a class="header__icon" href="./favourites.html" title="Favorites">
                <span class="material-symbols-outlined">favorite</span>
            </a>
            <a class="header__icon" href="./cart.html" title="Cart">
                <span class="material-symbols-outlined">shopping_cart</span>
            </a>
            <a class="header__icon" href="profile_bootstrap.html" title="Profile">
                <span class="material-symbols-outlined">account_circle</span>
            </a>
        </div>
    </div>
</nav>

<!-- Profile -->
<main class="profile-section">
    <div class="container">
        <div class="profile-card">
            <div class="row g-4 g-md-5 align-items-start">

                <!-- Left: Avatar + Logout -->
                <div class="col-12 col-md-5">
                    <div class="avatar-wrap">
                        <div class="avatar">
                            <span class="material-symbols-outlined">account_circle</span>
                        </div>
                        <button class="btn-logout" id="btn-logout">Log out?</button>
                    </div>
                </div>

                <div class="col-divider d-md-none"></div>

                <!-- Right: Info + Edit -->
                <div class="col-12 col-md-7">
                    <div class="profile-info">
                        <div class="info-block">

                            <div class="field-group">
                                <span class="field-label">Full Name</span>
                                <input class="info-field" id="field-name" type="text"
                                       value="name , td" readonly>
                            </div>

                            <div class="field-group">
                                <span class="field-label">Email</span>
                                <input class="info-field" id="field-email" type="email"
                                       value="example@email.com" readonly>
                            </div>

                            <div class="field-group">
                                <span class="field-label">Phone</span>
                                <input class="info-field" id="field-phone" type="tel"
                                       value="+380 xx xxx xx xx" readonly>
                            </div>

                        </div>

                        <button class="btn-edit" id="btn-edit">Edit</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="py-3 px-4">
    <div class="container-fluid d-flex flex-column flex-sm-row
                justify-content-between align-items-center gap-2">
        <small>© 2026 Rusaniuk&amp;Popovych, Inc. All rights reserved</small>
        <div class="d-flex flex-wrap justify-content-center gap-1">
            <a href="#">Get Help</a>
            <a href="#">About Us</a>
            <a href="#">Contacts</a>
        </div>
    </div>
</footer>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="profileToast" class="toast align-items-center border-0" role="alert" aria-live="assertive">
        <div class="d-flex align-items-center gap-2 p-3" style="background:var(--highlight-color); border-radius:10px;">
            <span class="material-symbols-outlined">check_circle</span>
            <span id="toast-msg">Profile saved!</span>
            <button type="button" class="btn-close ms-auto"
                    data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const editBtn   = document.getElementById('btn-edit');
    const fields    = document.querySelectorAll('.info-field');
    const logoutBtn = document.getElementById('btn-logout');
    let editing = false;

    function showToast(msg) {
        document.getElementById('toast-msg').textContent = msg;
        bootstrap.Toast.getOrCreateInstance(
            document.getElementById('profileToast'), { delay: 2500 }
        ).show();
    }

    editBtn.addEventListener('click', () => {
        editing = !editing;
        fields.forEach(f => editing ? f.removeAttribute('readonly') : f.setAttribute('readonly', ''));
        if (editing) fields[0].focus();
        editBtn.textContent = editing ? 'Save' : 'Edit';
        editBtn.style.backgroundColor = editing ? 'var(--highlight-dark-color)' : '';
        if (!editing) showToast('Profile saved!');
    });

    logoutBtn.addEventListener('click', () => {
        if (confirm('Are you sure you want to log out?')) showToast('Logged out successfully');
    });
</script>
</body>
</html>
