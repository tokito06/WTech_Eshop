<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts & Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anaheim:wght@400..800&display=swap" rel="stylesheet">

  <title>Payment</title>

  <!-- Custom stylesheets -->
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/cart.css">
  <link rel="stylesheet" href="../styles/payment.css">
</head>
<body>

<!-- Header -->
<nav class="navbar">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <a class="navbar-brand" href="./index.html">RuPo</a>
    <div class="d-flex align-items-center gap-1">
      <a class="header__icon" href="./favourites.html" title="Favorites">
        <span class="material-symbols-outlined">favorite</span>
      </a>
      <a class="header__icon" href="profile.html" title="Profile">
        <span class="material-symbols-outlined">account_circle</span>
      </a>
    </div>
  </div>
</nav>

<!-- Payment -->
<main class="payment-section">
  <div class="container">
    <div class="row g-4 g-xl-5 align-items-start">

      <!-- Left: payment methods -->
      <div class="col-12 col-lg-7">

        <div class="payment-title">
          <span class="material-symbols-outlined">shopping_bag</span>
          <h1>Select payment method</h1>
        </div>

        <div class="payment-methods">

          <!-- Apple Pay -->
          <button class="pay-btn">
            <svg width="20" height="20" viewBox="0 0 814 1000" fill="currentColor">
              <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 383.8 79 316 79 316c52-84.5 133.2-132.7 218.2-132.7 72.8 0 131 45.7 176.5 45.7 43.1 0 110.5-48.5 195.3-48.5 31.3.1 131 3 197.1 100.4zm-252.3-216.9c35.5-44.1 63.1-105.3 63.1-166.6 0-8.9-.6-17.9-2.2-25.4C546.3 2.9 483.8 31.6 441.9 81.4c-33.5 38.9-63.7 99.6-63.7 161.8 0 10.1 1.7 20.2 2.8 23.5 3.9.7 10.1 1.7 16.3 1.7 56.7 0 115.2-27.5 148.5-73.4z"/>
            </svg>
            Pay
          </button>

          <!-- Google Pay -->
          <button class="pay-btn">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Pay
          </button>

          <!-- PayPal -->
          <button class="pay-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106zm14.146-14.42a3.35 3.35 0 0 0-.607-.541c-.013.076-.026.175-.041.254-.59 3.025-2.566 6.251-8.559 6.251h-2.19a2.104 2.104 0 0 0-2.079 1.757l-1.175 7.45-.332 2.105a.563.563 0 0 0 .555.635h3.889c.46 0 .85-.334.922-.788l.38-2.408.245-1.547a.932.932 0 0 1 .921-.789h.581c3.757 0 6.698-1.527 7.556-5.945.36-1.847.173-3.388-.667-4.434z" fill="#003087"/>
              <path d="M19.67 6.376a7.32 7.32 0 0 0-.898-.238 11.317 11.317 0 0 0-1.796-.137h-5.45a.93.93 0 0 0-.92.788L9.533 14.6l-.03.19a1.053 1.053 0 0 1 1.04-.901h2.19c4.298 0 7.664-1.747 8.647-6.797.029-.149.054-.294.077-.437a5.86 5.86 0 0 0-.787-.279z" fill="#0070E0"/>
            </svg>
          </button>

          <!-- Card form -->
          <div class="card-form">
            <div class="card-form__header">
              <svg width="38" height="24" viewBox="0 0 38 24">
                <rect width="38" height="24" rx="4" fill="#f2f2f2"/>
                <circle cx="15" cy="12" r="7" fill="#EB001B"/>
                <circle cx="23" cy="12" r="7" fill="#F79E1B"/>
                <path d="M19 6.8a7 7 0 0 1 0 10.4A7 7 0 0 1 19 6.8z" fill="#FF5F00"/>
              </svg>
              <svg width="38" height="24" viewBox="0 0 38 24">
                <rect width="38" height="24" rx="4" fill="#f2f2f2"/>
                <text x="7" y="16" font-family="Arial" font-weight="bold" font-size="11" fill="#1A1F71" letter-spacing="1">VISA</text>
              </svg>
            </div>

            <div>
              <div class="card-form__label">Card number</div>
              <input class="card-form__input"
                     type="text" id="card-number"
                     placeholder="0000 0000 0000 0000"
                     maxlength="19" inputmode="numeric">
            </div>

            <div class="row g-3">
              <div class="col-6">
                <div class="card-form__label">Month / Year</div>
                <input class="card-form__input"
                       type="text" id="card-expiry"
                       placeholder="00 / 00"
                       maxlength="7" inputmode="numeric">
              </div>
              <div class="col-6">
                <div class="card-form__label">CVV</div>
                <input class="card-form__input"
                       type="password" id="card-cvv"
                       placeholder="***"
                       maxlength="4" inputmode="numeric">
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="col-12 col-lg-5 cart-sticky">
        <div class="cart-summary">
          <span class="cart-summary__title">Cart summary</span>

          <div class="cart-summary__amounts">
            <div class="cart-summary__amount">
              <span>Items amount</span>
              <span>100.99 €</span>
            </div>
            <div class="cart-summary__amount">
              <span>Delivery amount</span>
              <small>from 0 €</small>
            </div>
            <div class="cart-summary__amount">
              <span>Total</span>
              <strong class="cart-summary__total">100.99 €</strong>
            </div>
          </div>

          <button class="cart-summary__btn" id="pay-btn">Pay</button>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- Footer -->
<footer class="py-3 px-4">
  <div class="container-fluid d-flex flex-column flex-sm-row
                justify-content-between align-items-center gap-2">
    <small>© 2026 Rusaniuk&amp;Popovych, Inc. All rights reserved</small>
    <div class="d-flex flex-wrap justify-content-center gap-1">
      <a href="#">Get Help</a>
      <a href="#">About Us</a>
      <a href="#">Contacts</a>
    </div>
  </div>
</footer>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="payToast" class="toast align-items-center border-0" role="alert" aria-live="assertive">
    <div class="d-flex align-items-center gap-2 p-3"
         style="background:var(--highlight-color); border-radius:10px;">
      <span class="material-symbols-outlined">check_circle</span>
      <span>Payment successful!</span>
      <button type="button" class="btn-close ms-auto"
              data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('card-number').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').substring(0, 16);
    this.value = v.replace(/(.{4})/g, '$1 ').trim();
  });

  document.getElementById('card-expiry').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').substring(0, 4);
    if (v.length >= 3) v = v.substring(0, 2) + ' / ' + v.substring(2);
    this.value = v;
  });

  document.getElementById('card-cvv').addEventListener('input', function () {
    this.value = this.value.replace(/\D/g, '').substring(0, 4);
  });

  document.getElementById('pay-btn').addEventListener('click', () => {
    window.location.href = './order-success.html';
  });
</script>
</body>
</html>
