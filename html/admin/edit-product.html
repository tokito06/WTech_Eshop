<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts & Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anaheim:wght@400..800&display=swap" rel="stylesheet">

    <title>Admin - Edit Product</title>

    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="../../styles/adproduct.css">
    <link rel="stylesheet" href="../../styles/addingproduct.css">
</head>
<body>

<!-- Header -->
<nav class="navbar">
    <div class="container-fluid d-flex align-items-center gap-3">
        <a class="navbar-brand flex-shrink-0" href="./products.html">Logo</a>
        <div class="admin-search-wrap flex-grow-1">
            <input class="admin-search" type="search" placeholder="Search">
        </div>
        <a class="header__icon ms-auto flex-shrink-0" href="../profile.html" title="Profile">
            <span class="material-symbols-outlined">account_circle</span>
        </a>
    </div>
</nav>

<!-- Main -->
<main class="add-product-main">
    <div class="container-fluid px-4 px-md-5">
        <div class="row g-4 g-xl-5 align-items-start justify-content-center">

            <!-- Left: photo + size/total -->
            <div class="col-12 col-md-5 col-lg-5 d-flex flex-column">

                <!-- Photo upload -->
                <div class="add-product-photo" id="photo-drop" title="Click or drag to upload">
                    <span class="add-product-photo__label" id="photo-label">Photo</span>
                    <img class="add-product-photo__preview" id="photo-preview" src="" alt="">
                    <input type="file" id="photo-input" accept="image/*" hidden>
                </div>

                <!-- Thumbnails row -->
                <div class="add-product-thumbs" id="thumbs-row">
                    <div class="add-product-thumb active" data-index="0"></div>
                    <div class="add-product-thumb" data-index="1"></div>
                    <div class="add-product-thumb" data-index="2"></div>
                    <div class="add-product-thumb" data-index="3"></div>
                    <div class="add-product-thumb" data-index="4"></div>
                </div>

                <!-- Size + Total -->
                <div class="d-flex gap-3 mt-3">
                    <input class="add-product-input add-product-input--half" type="text" placeholder="Size">
                    <input class="add-product-input add-product-input--half" type="number" placeholder="Total" min="0">
                </div>
            </div>

            <!-- Right: fields + add button -->
            <div class="col-12 col-md-7 col-lg-5">
                <div class="add-product-fields">

                    <input class="add-product-input" type="text" id="product-name" placeholder="Name" required>

                    <textarea class="add-product-textarea" id="product-desc"
                              placeholder="Describing: material , colour , etc." rows="3"></textarea>

                    <div class="d-flex gap-3">
                        <input class="add-product-input add-product-input--half" type="text" placeholder="Type">
                    </div>

                    <div class="d-flex gap-3">
                        <input class="add-product-input add-product-input--half" type="text" placeholder="Sex">
                    </div>


                    <input class="add-product-input add-product-input--vendor" type="text" placeholder="Vendor">

                    <button class="add-product-btn" id="add-btn">Save</button>

                </div>
            </div>

        </div>
    </div>
</main>



<!-- Footer -->
<footer class="py-3 px-4">
    <div class="container-fluid d-flex flex-column flex-sm-row
                justify-content-between align-items-center gap-2">
        <small>© 2026 Rusaniuk&amp;Popovych, Inc. All rights reserved</small>
        <div class="d-flex flex-wrap justify-content-center gap-1">
            <a href="#">Get Help</a>
            <a href="#">About Us</a>
            <a href="#">Contacts</a>
        </div>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Photo upload
    const photoDrop    = document.getElementById('photo-drop');
    const photoInput   = document.getElementById('photo-input');
    const photoPreview = document.getElementById('photo-preview');
    const photoLabel   = document.getElementById('photo-label');

    photoDrop.addEventListener('click', () => photoInput.click());

    photoDrop.addEventListener('dragover', e => {
        e.preventDefault();
        photoDrop.classList.add('drag-over');
    });
    photoDrop.addEventListener('dragleave', () => photoDrop.classList.remove('drag-over'));
    photoDrop.addEventListener('drop', e => {
        e.preventDefault();
        photoDrop.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) showPreview(file);
    });

    photoInput.addEventListener('change', () => {
        if (photoInput.files[0]) showPreview(photoInput.files[0]);
    });

    function showPreview(file) {
        photoPreview.src = URL.createObjectURL(file);
        photoPreview.style.display = 'block';
        photoLabel.style.display   = 'none';
    }

    // Thumbnail selection
    document.getElementById('thumbs-row').addEventListener('click', e => {
        const thumb = e.target.closest('.add-product-thumb');
        if (!thumb) return;
        document.querySelectorAll('.add-product-thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
    });

    // Add button — basic validation
    document.getElementById('add-btn').addEventListener('click', () => {
        const name = document.getElementById('product-name');
        if (!name.value.trim()) {
            name.classList.add('add-product-input--error');
            name.focus();
        } else {
            name.classList.remove('add-product-input--error');
            // Navigate back or show success
            alert('Product added!');
        }
    });

    document.getElementById('product-name').addEventListener('input', function () {
        this.classList.remove('add-product-input--error');
    });
</script>
</body>
</html>
